# _c.f._ https://pnpm.io/settings

color: always
packages:
  - 'back'
  - 'front'
  - 'front/lib-svelte'
  - 'mise-a-jour-financements'
  - 'demande-diag'
  - 'comparaison-grist'
  - 'regles-eslint'

minimumReleaseAge: 10080 # 7 jours (exprimé en minutes)
preferFrozenLockfile: true

# Versions partagées entre lib-svelte (compilation) et front (résolution runtime des
# bundles SSR servis depuis front/_site). Référencées par « catalog: » dans les deux
# package.json pour éviter toute dérive de version.
catalog:
  axios: ^1.15.0
  entities: ^8.0.0
  isomorphic-dompurify: ^3.18.0

minimumReleaseAgeExclude:
  - devalue@5.8.1
  - '@lab-anssi/ui-kit'
  - form-data@4.0.6
  - dompurify@3.4.11
