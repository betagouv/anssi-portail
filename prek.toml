[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "format", name = "format", entry = "pnpm exec prettier --write", language = "system", files = "\\.(js|ts|jsx|tsx|json|svelte|css|scss|md|html|cjs|mjs|yaml)$", pass_filenames = true, stages = [ "commit" ] },
]
