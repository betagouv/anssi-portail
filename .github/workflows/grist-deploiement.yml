name: Déploie des Grist
run-name: Compare et déploie des documents Grist
permissions: {}

on:
  workflow_call:
    inputs:
      cible:
        description: 'Cible'
        type: string
        required: true
    secrets:
      SOURCE_GRIST_URL:
        required: true
      SOURCE_GRIST_ID_TABLE:
        required: true
      SOURCE_GRIST_API_KEY:
        required: true
      CIBLE_GRIST_URL:
        required: true
      CIBLE_GRIST_ID_TABLE:
        required: true
      CIBLE_GRIST_API_KEY:
        required: true

jobs:
  genere-tableau-comparatif:
    name: Comparaison
    runs-on: ubuntu-latest
    environment: DEPLOIEMENT_GUIDES
    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Configurer Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Installe pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.24.0

      - name: (TOUS) Installe les dépendances
        run: pnpm install --frozen-lockfile

      - name: Lance le script de comparaison
        run: pnpm -F comparaison-grist "start:${INPUTS_CIBLE}:compare"
        env:
          SOURCE_GRIST_URL: ${{ secrets.SOURCE_GRIST_URL }}
          SOURCE_GRIST_ID_TABLE: ${{ secrets.SOURCE_GRIST_ID_TABLE }}
          SOURCE_GRIST_API_KEY: ${{ secrets.SOURCE_GRIST_API_KEY }}
          CIBLE_GRIST_URL: ${{ secrets.CIBLE_GRIST_URL }}
          CIBLE_GRIST_ID_TABLE: ${{ secrets.CIBLE_GRIST_ID_TABLE }}
          CIBLE_GRIST_API_KEY: ${{ secrets.CIBLE_GRIST_API_KEY }}
          INPUTS_CIBLE: ${{ inputs.cible }}

      - name: Sauvegarde l'empreinte source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: empreinte-data-${{ inputs.cible }}
          path: comparaison-grist/empreinte.txt

  deploie-ressources-grist:
    name: Déploiement
    runs-on: ubuntu-latest
    needs: genere-tableau-comparatif
    environment: DEPLOIEMENT_GUIDES
    steps:
      - name: Télécharger les empreintes sources
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: empreinte-data-${{ inputs.cible }}

      - name: Affiche les empreintes sources
        run: echo EMPREINTE=$(cat empreinte.txt) >> "$GITHUB_ENV"

      - name: Recopie le contenu
        id: copie
        run: |
          curl --request POST \
            --url ${{ secrets.CIBLE_GRIST_URL }}/replace \
            --header 'authorization: Bearer ${{ secrets.CIBLE_GRIST_API_KEY }}' \
            --header 'content-type: application/json' \
            --data "{
              \"sourceDocId\": \"${EMPREINTE}\"
            }" \
            || RC=$?
          echo "résultat : ${RC}"
          echo "rc=${RC:-0}" >> $GITHUB_OUTPUT

      - name: Échoue cas d'erreur
        if: steps.copie.outputs.rc != '0'
        run: |
          echo "❌ Erreur technique copie"
          exit 1
