name: Déploie les guides
run-name: Compare et déploie les guides de démo en prod
permissions: {}

on:
  workflow_dispatch: # Pour activer le déclenchement manuel

jobs:
  compare-et-deploie-guides:
    name: 'Guides'
    uses: ./.github/workflows/grist-deploiement.yml
    with:
      cible: guides
      environnement: DEPLOIEMENT_GUIDES
    secrets:
      SOURCE_GRIST_URL: ${{ secrets.GUIDES_SOURCE_GRIST_URL }}
      SOURCE_GRIST_ID_TABLE: ${{ secrets.GUIDES_SOURCE_GRIST_ID_TABLE }}
      SOURCE_GRIST_API_KEY: ${{ secrets.GUIDES_SOURCE_GRIST_API_KEY }}
      CIBLE_GRIST_URL: ${{ secrets.GUIDES_CIBLE_GRIST_URL }}
      CIBLE_GRIST_ID_TABLE: ${{ secrets.GUIDES_CIBLE_GRIST_ID_TABLE }}
      CIBLE_GRIST_API_KEY: ${{ secrets.GUIDES_CIBLE_GRIST_API_KEY }}

  compare-et-deploie-cellar:
    name: 'Documents'
    uses: ./.github/workflows/cellar-deploiement.yml
    secrets:
      CELLAR_ACCESS_KEY_ID: ${{ secrets.CELLAR_ACCESS_KEY_ID }}
      CELLAR_SECRET_ACCESS_KEY: ${{ secrets.CELLAR_SECRET_ACCESS_KEY }}
      GUIDES_BUCKET_SOURCE: ${{ secrets.GUIDES_BUCKET_SOURCE }}
      GUIDES_BUCKET_CIBLE: ${{ secrets.GUIDES_BUCKET_CIBLE }}
      MQC_API_DOCUMENTS_TOKEN: ${{ secrets.MQC_API_DOCUMENTS_TOKEN }}
      MQC_API_DOCUMENTS_URL: ${{ secrets.MQC_API_DOCUMENTS_URL }}
