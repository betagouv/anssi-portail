name: Déploiement Node
permissions: {}

on:
  workflow_call:
    inputs:
      nom:
        required: true
        type: string
      environnement:
        required: true
        type: string
      secrets:
        CLEVER_CLOUD_SECRET:
          required: true
        CLEVER_CLOUD_TOKEN:
          required: true
        CLEVER_CLOUD_ID_APP:
          required: true

jobs:
  deploiement-node:
    runs-on: ubuntu-latest
    name: ${{ inputs.nom }}
    environment: ${{ inputs.environnement }}
    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Cloner l'intégralité du dépôt, pour ne pas avoir de « shallow repo » rejeté par Clever
          persist-credentials: false

      - name: Configurer Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Installe pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.24.0

      - name: Construis la lib Svelte
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @anssi-portail/svelte build

      - name: Setup Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '4.0.5'
          bundler-cache: true
          cache-version: 0
          working-directory: ./front

      - name: Installer la CLI Clever Cloud
        shell: bash
        run: npm install -g clever-tools@4.4.0

      - name: Connecter à Clever
        env:
          CLEVER_SECRET: ${{ secrets.CLEVER_CLOUD_SECRET }}
          CLEVER_TOKEN: ${{ secrets.CLEVER_CLOUD_TOKEN }}
          ID_APP: ${{ secrets.CLEVER_CLOUD_ID_APP }}
        run: |
          clever link "$ID_APP"
          clever env | grep -v "^#" | tr -d '"' >> "$GITHUB_ENV"

      - name: Construis avec Jekyll
        run: |
          bundle config set --local path './front/vendor/bundle'
          bundle exec --gemfile=./front/Gemfile jekyll build -s ./front -d ./front/_site
        env:
          JEKYLL_ENV: production

      - name: Déployer sur Clever Cloud
        env:
          CLEVER_SECRET: ${{ secrets.CLEVER_CLOUD_SECRET }}
          CLEVER_TOKEN: ${{ secrets.CLEVER_CLOUD_TOKEN }}
          ID_APP: ${{ secrets.CLEVER_CLOUD_ID_APP }}
        run: |
          git config --global user.email "contact@messervicescyber.beta.gouv.fr"
          git config --global user.name "MesServicesCyber"
          git add --force front/_site
          git commit -m "Ajoute le site généré"
          NODE_VERSION="$(./scripts/get-node-version.sh)"
          clever env set CC_NODE_VERSION "$NODE_VERSION"
          clever deploy --force --same-commit-policy=rebuild
